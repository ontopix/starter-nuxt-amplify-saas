seo:
  title: 'Ontopix - About Us'
  ogTitle: 'Ontopix - About Us'
  description: &seoDescription "Learn about Ontopix's mission to make AI-powered customer service accessible to businesses of all sizes. Meet our team and see our impact."
  ogDescription: *seoDescription
  ogImage: '/og.png'
  twitterCard: 'summary_large_image'

hero:
  titleAbout: "About"
  titleOntopix: "Ontopix"
  description: "We're on a mission to make AI-powered customer service accessible to businesses of all sizes. Our virtual agents understand context, speak naturally, and deliver exceptional experiences 24/7."

cta:
  title: "Ready to Transform Your Customer Service?"
  description: "Join thousands of businesses already using Ontopix virtual agents to deliver exceptional customer experiences."
  links:
    - label: "Get Started"
      to: "/start"
      icon: "heroicons:arrow-right"
      variant: "solid"
      color: "primary"
    - label: "Solutions"
      to: "/solutions"
      variant: "outline"
      color: "primary"

mission:
  title: "Our Mission"
  description: | #md
    Customer service shouldn't be a cost center—it should be a competitive advantage.
    We believe every business deserves access to intelligent, empathetic, and scalable customer support.

    That's why we built Ontopix: to democratize AI-powered customer service and help businesses of all
    sizes deliver exceptional experiences that keep customers coming back.
  principles:
    - key: "customer-centric"
      value: "Customer-Centric"
      icon: "heroicons:heart"
      description: "Every decision we make prioritizes the customer experience."

    - key: "innovation"
      value: "Innovation"
      icon: "heroicons:rocket-launch"
      description: "We push the boundaries of what's possible with AI technology."

    - key: "accessibility"
      value: "Accessibility"
      icon: "heroicons:chat-bubble-left-right"
      description: "Advanced AI should be accessible to businesses of all sizes."

    - key: "trust"
      value: "Trust"
      icon: "heroicons:shield-check"
      description: "We build secure, reliable solutions you can depend on."

