faqs:
  title: "Frequently Asked Questions"
  description: "Everything you need to know about Ontopix virtual agents"
  categories:
    - label: "Onboarding"
      questions:
        - label: "How quickly can I deploy a virtual agent?"
          icon: "heroicons:clock"
          content: | #md
            Most businesses can have their virtual agent up and running within 24-48 hours.
            Our streamlined onboarding process includes setup assistance and initial training.

        - label: "How does pricing work?"
          icon: "heroicons:credit-card"
          content: | #md
            We offer flexible pricing based on conversation volume and features needed.
            Start with our free tier for up to 100 conversations per month, then scale as you grow.

        - label: "What kind of support do you provide?"
          icon: "heroicons:microphone"
          content: | #md
            We provide 24/7 technical support, dedicated customer success managers for enterprise clients,
            comprehensive documentation, and regular training sessions.

        - label: "Do I need technical expertise to get started?"
          icon: "heroicons:academic-cap"
          content: | #md
            Not at all. Our onboarding team handles the technical setup for you.
            You just need to provide access to your business systems and we’ll take care of the rest.

    - label: "Agents"
      questions:
        - label: "What languages are supported?"
          icon: "heroicons:chat-bubble-left-ellipsis"
          content: | #md
            Our virtual agents support 25+ languages including English, Spanish, French, German, Portuguese, and many more.
            We can also add custom language support upon request.

        - label: "Can agents handle both voice and chat?"
          icon: "heroicons:phone"
          content: | #md
            Yes! Ontopix agents are designed for omnichannel use, supporting both live voice calls and chat-based interactions.

        - label: "How customizable are the agents?"
          icon: "heroicons:adjustments-horizontal"
          content: | #md
            Agents can be fully customized to match your brand voice, tone, and workflows.
            You can define conversation scripts, escalation paths, and even integrate knowledge bases.

    - label: "Integrations"
      questions:
        - label: "Can the virtual agent integrate with my existing systems?"
          icon: "heroicons:puzzle-piece"
          content: | #md
            Yes! Our platform offers pre-built integrations with popular CRM systems, helpdesks, and business tools.
            We also provide APIs for custom integrations.

        - label: "Which platforms are supported out-of-the-box?"
          icon: "heroicons:cube-transparent"
          content: | #md
            Ontopix integrates seamlessly with Salesforce, Zendesk, HubSpot, Dynamics 365, and Slack.
            Additional integrations are continuously being added to our marketplace.

    - label: "Quality"
      questions:
        - label: "How do you ensure the quality of the virtual agent?"
          icon: "heroicons:check-circle"
          content: | #md
            We use a combination of automated testing and human review to ensure the quality of the virtual agent.
            We also have a team of quality assurance experts who review the virtual agent on a regular basis.

        - label: "Can I monitor conversations in real-time?"
          icon: "heroicons:eye"
          content: | #md
            Yes. You can view live transcripts, listen to calls, and provide instant feedback.
            Our dashboards give you visibility into agent performance at all times.

        - label: "Do agents learn and improve over time?"
          icon: "heroicons:sparkles"
          content: | #md
            Absolutely. Our agents leverage AI learning models that improve with each interaction,
            ensuring higher accuracy and smoother conversations over time.

    - label: "Security"
      questions:
        - label: "How secure is the platform?"
          icon: "heroicons:lock-closed"
          content: | #md
            Security is our top priority. All data is encrypted in transit and at rest, and our infrastructure
            follows industry best practices for access control and monitoring.

        - label: "Do you comply with GDPR and other regulations?"
          icon: "heroicons:shield-check"
          content: | #md
            Yes, Ontopix is fully GDPR-compliant and also aligns with SOC 2 and HIPAA requirements for clients in regulated industries.

        - label: "Where is data stored?"
          icon: "heroicons:server"
          content: | #md
            Data is stored in secure, region-specific data centers based on your compliance needs.
            You can choose EU, US, or APAC hosting depending on your regulatory requirements.
