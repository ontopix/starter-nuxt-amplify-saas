features:
  title: "Explore Key Features"
  description: "Dive deep into what makes our virtual agents exceptional."
  tabs:
    - label: "Natural Conversations"
      title: "Human-Like Dialogue"
      description: "Our virtual agents don't just match keywords - they understand context, maintain conversation flow, and respond naturally to complex queries."
      image: "/images/features/conversations.png"
      reverse: false
      points:
        - "Context awareness across multi-turn conversations"
        - "Intent recognition with 95%+ accuracy"
        - "Sentiment analysis and empathetic responses"
        - "Support for 25+ languages and dialects"

    - label: "Integrations"
      title: "Seamless System Integration"
      description: "Connect your virtual agent to existing business systems and workflows without disrupting your current operations."
      image: "/images/features/integrations.png"
      reverse: true
      points:
        - "Pre-built connectors for popular CRM systems"
        - "RESTful APIs for custom integrations"
        - "Real-time data synchronization"
        - "Secure authentication and data handling"

    - label: "Analytics"
      title: "Analytics"
      description: "Comprehensive analytics help you understand customer needs, optimize agent performance, and measure business impact."
      image: "/images/features/analytics.png"
      reverse: false
      points:
        - "Real-time conversation monitoring"
        - "Customer satisfaction scoring"
        - "Performance metrics and KPI tracking"
        - "Custom reporting and dashboards"

steps:
  title: "How It Works"
  description: "Get your virtual agent up and running in three simple steps."
  items:
