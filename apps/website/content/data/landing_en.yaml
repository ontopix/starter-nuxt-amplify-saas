    description: "With your enterprise systems"
    icon: "heroicons:link"
    leading: "Link your existing systems and customize your virtual agent's personality and knowledge."
    points:
        - "Our agents are proficient with major CRM and ERP systems"
        - "We can help you integrate with your custom systems"
