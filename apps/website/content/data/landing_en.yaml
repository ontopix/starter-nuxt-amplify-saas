    description: "Using our automated framework"
    icon: "heroicons:cog-6-tooth"
    leading: "Using our automated test and validation framwork, ensure perfect responses before going live."
    points:
        - "Define criteria to evaluate agent performance"
        - "Test scenarios and identify blind spots"
        - "Define transfer rules for complex scenarios"
        - "Prioritize agent improvement based on performance metrics"

  - title: "Deploy"
    description: "At virtually unlimited scale"
    icon: "heroicons:rocket-launch"
    leading: "Launch across all channels and watch your virtual agent handle customer inquiries 24/7 while you focus on growth."
    points:
        - "There is an unlimited number of virtual agents you can deploy"
        - "Our systems is built for scale, so you can grow without limits"
        - "Monitor the performance of your agents in real-time"
        - "Improve your agents based on metrics and automated assessments"

