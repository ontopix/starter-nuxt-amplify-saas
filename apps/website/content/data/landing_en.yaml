seo:
  title: 'Ontopix - AI Virtual Agents for Customer Service'
  ogTitle: 'Ontopix - AI Virtual Agents for Customer Service'
  description: &seoDescription 'Transform your customer service with AI-powered virtual agents. Deploy intelligent conversations that work 24/7, reduce costs, and improve satisfaction.'
  ogDescription: *seoDescription
  ogImage: '/og.png'
  twitterCard: 'summary_large_image'

hero:
  titleTransform: "Transform Customer Service with"
  titleAgents: "AI Virtual Agents"
  description: "Deploy intelligent virtual agents that understand context, speak naturally, and resolve customer issues 24/7. Reduce costs while improving satisfaction."
  image: "/images/hero-dashboard.png"
  imageAlt: "Ontopix Virtual Agent Dashboard"
  links:
    - &start
      label: "Get Started"
      to: "/start"
      icon: "heroicons:arrow-right"
      variant: "solid"
      color: "primary"
    - &solutions
      label: "Solutions"
      to: "/solutions"
      variant: "outline"
      color: "primary"

cta:
  title: "Ready to Transform Your Customer Service?"
  description: "Join thousands of businesses already using Ontopix virtual agents to deliver exceptional customer experiences."
  links:
    - *start
    - *solutions

reasons:
  title: "Why Choose Ontopix Virtual Agents?"
  description: "Our AI-powered virtual agents deliver exceptional customer experiences with advanced natural language understanding."
  cards:
    - title: "Natural Language Processing"
      icon: "heroicons:chat-bubble-left-ellipsis"
      description: "Advanced NLP understands intent, context, and nuance in customer conversations."

    - title: "Multi-Channel Deployment"
      icon: "heroicons:device-phone-mobile"
      description: "Deploy across web chat, phone, email, SMS, and social media platforms."

    - title: "Smart Escalation"
      icon: "heroicons:arrow-up-right"
      description: "Seamlessly transfer complex issues to human agents with full context."

    - title: "Real-time Analytics"
      icon: "heroicons:chart-bar"
      description: "Monitor performance, track satisfaction, and optimize conversations continuously."

    - title: "Custom Integrations"
      icon: "heroicons:puzzle-piece"
      description: "Connect with your CRM, helpdesk, and business tools through APIs."

    - title: "Voice & Text Support"
      icon: "heroicons:microphone"
      description: "Handle both voice calls and text conversations with the same intelligence."

stats:
  title: "Proven Results"
  description: "See the impact our virtual agents have on businesses like yours."
  cards:
    - label: "Cost Reduction"
      value: "85%"
      icon: "heroicons:chart-bar"

    - label: "Availability"
      value: "24/7"
      icon: "heroicons:clock"

    - label: "Faster Resolution"
      value: "3x"
      icon: "heroicons:arrow-up-right"

    - label: "Customer Satisfaction"
      value: "95%"
