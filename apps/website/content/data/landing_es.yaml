    - *start
    - *solutions

reasons:
  title: "¿Por qué elegir los Agentes Virtuales de Ontopix?"
  description: "Nuestros agentes virtuales impulsados por IA ofrecen experiencias excepcionales al cliente con comprensión avanzada del lenguaje natural."
  cards:
    - title: "Procesamiento de Lenguaje Natural"
      icon: "heroicons:chat-bubble-left-ellipsis"
      description: "El NLP avanzado comprende la intención, el contexto y los matices en las conversaciones con los clientes."

    - title: "Despliegue Multicanal"
      icon: "heroicons:device-phone-mobile"
      description: "Despliega en chat web, teléfono, correo electrónico, SMS y plataformas de redes sociales."

    - title: "Escalado Inteligente"
      icon: "heroicons:arrow-up-right"
      description: "Transfiere sin problemas los casos complejos a agentes humanos con todo el contexto."

    - title: "Analítica en Tiempo Real"
      icon: "heroicons:chart-bar"
      description: "Monitorea el rendimiento, mide la satisfacción y optimiza las conversaciones de forma continua."

    - title: "Integraciones Personalizadas"
      icon: "heroicons:puzzle-piece"
      description: "Conéctate con tu CRM, mesa de ayuda y herramientas empresariales a través de APIs."

    - title: "Soporte de Voz y Texto"
      icon: "heroicons:microphone"
      description: "Gestiona tanto llamadas de voz como conversaciones por texto con la misma inteligencia."

