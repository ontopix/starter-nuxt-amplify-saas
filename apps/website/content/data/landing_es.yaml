faqs:
  title: "Preguntas Frecuentes"
  description: "Todo lo que necesitas saber sobre los agentes virtuales de Ontopix"
  categories:
    - label: "Incorporación"
      questions:
        - label: "¿Con qué rapidez puedo desplegar un agente virtual?"
          icon: "heroicons:clock"
          content: | #md
            La mayoría de las empresas pueden tener su agente virtual funcionando en 24-48 horas.
            Nuestro proceso de incorporación simplificado incluye asistencia en la configuración y formación inicial.

        - label: "¿Cómo funciona la tarificación?"
          icon: "heroicons:credit-card"
          content: | #md
            Ofrecemos precios flexibles en función del volumen de conversaciones y de las funcionalidades necesarias.
            Empieza con nuestro plan gratuito hasta 100 conversaciones al mes, y escala a medida que creces.

        - label: "¿Qué tipo de soporte proporcionáis?"
          icon: "heroicons:microphone"
          content: | #md
            Ofrecemos soporte técnico 24/7, gestores de éxito dedicados para clientes empresariales,
            documentación completa y sesiones de formación periódicas.

        - label: "¿Necesito conocimientos técnicos para empezar?"
          icon: "heroicons:academic-cap"
          content: | #md
            Para nada. Nuestro equipo de incorporación se encarga de la configuración técnica por ti.
            Solo necesitas darnos acceso a tus sistemas de negocio y nosotros nos ocupamos del resto.

    - label: "Agentes"
      questions:
        - label: "¿Qué idiomas se soportan?"
          icon: "heroicons:chat-bubble-left-ellipsis"
          content: | #md
            Nuestros agentes virtuales soportan más de 25 idiomas, incluyendo inglés, español, francés, alemán, portugués y muchos más.
            También podemos añadir soporte para idiomas personalizados bajo petición.

        - label: "¿Los agentes pueden manejar voz y chat?"
          icon: "heroicons:phone"
          content: | #md
            ¡Sí! Los agentes de Ontopix están diseñados para uso omnicanal, soportando tanto llamadas de voz en directo como interacciones por chat.

        - label: "¿Qué nivel de personalización ofrecen los agentes?"
          icon: "heroicons:adjustments-horizontal"
          content: | #md
            Los agentes se pueden personalizar completamente para reflejar la voz, el tono y los flujos de trabajo de tu marca.
            Puedes definir guiones de conversación, rutas de escalado e incluso integrar bases de conocimiento.

    - label: "Integraciones"
      questions:
        - label: "¿El agente virtual puede integrarse con mis sistemas actuales?"
          icon: "heroicons:puzzle-piece"
          content: | #md
            ¡Sí! Nuestra plataforma ofrece integraciones listas con los CRM más populares, sistemas de soporte y herramientas de negocio.
            También proporcionamos APIs para integraciones personalizadas.

        - label: "¿Qué plataformas están soportadas de forma nativa?"
          icon: "heroicons:cube-transparent"
          content: | #md
            Ontopix se integra de manera fluida con Salesforce, Zendesk, HubSpot, Dynamics 365 y Slack.
            Continuamente añadimos nuevas integraciones a nuestro marketplace.

    - label: "Calidad"
      questions:
        - label: "¿Cómo garantizáis la calidad del agente virtual?"
          icon: "heroicons:check-circle"
          content: | #md
            Usamos una combinación de pruebas automatizadas y revisión humana para garantizar la calidad del agente virtual.
            Además, contamos con un equipo de expertos en aseguramiento de calidad que revisa los agentes de forma periódica.

        - label: "¿Puedo monitorizar las conversaciones en tiempo real?"
          icon: "heroicons:eye"
          content: | #md
            Sí. Puedes ver transcripciones en directo, escuchar llamadas y dar feedback inmediato.
            Nuestros paneles te ofrecen visibilidad sobre el rendimiento del agente en todo momento.

        - label: "¿Los agentes aprenden y mejoran con el tiempo?"
          icon: "heroicons:sparkles"
          content: | #md
            Por supuesto. Nuestros agentes utilizan modelos de IA que aprenden de cada interacción,
            mejorando la precisión y la fluidez de las conversaciones con el tiempo.

    - label: "Seguridad"
      questions:
        - label: "¿Qué nivel de seguridad tiene la plataforma?"
          icon: "heroicons:lock-closed"
          content: | #md
            La seguridad es nuestra máxima prioridad. Todos los datos están cifrados en tránsito y en reposo, y nuestra infraestructura
            sigue las mejores prácticas del sector en control de accesos y monitorización.

        - label: "¿Cumplís con el RGPD y otras normativas?"
          icon: "heroicons:shield-check"
          content: | #md
            Sí, Ontopix cumple totalmente con el RGPD y también se ajusta a SOC 2 y HIPAA para clientes de sectores regulados.

        - label: "¿Dónde se almacenan los datos?"
          icon: "heroicons:server"
          content: | #md
            Los datos se almacenan en centros de datos seguros y específicos por región según tus necesidades de cumplimiento.
            Puedes elegir entre alojamiento en la UE, EE. UU. o APAC dependiendo de tus requisitos regulatorios.
