features:
  title: "Explora las Características Clave"
  description: "Entiende mejor por qué nuestros agentes virtuales son excepcionales"
  tabs:
    - label: "Conversaciones Naturales"
      title: "Diálogo Humano"
      description: "Nuestros agentes virtuales no solo buscan palabras clave: comprenden el contexto, mantienen el flujo de la conversación y responden de manera natural a consultas complejas."
      image: "/images/features/conversations.png"
      reverse: false
      points:
        - "Conciencia de contexto en conversaciones de varios turnos"
        - "Reconocimiento de intención con más del 95% de precisión"
        - "Análisis de sentimiento y respuestas empáticas"
        - "Soporte para más de 25 idiomas y dialectos"

    - label: "Integraciones"
      title: "Integración Perfecta de Sistemas"
      description: "Conecta tu agente virtual a sistemas y flujos de trabajo empresariales existentes sin interrumpir tus operaciones actuales."
      image: "/images/features/integrations.png"
      reverse: true
      points:
        - "Conectores preconstruidos para sistemas CRM populares"
        - "APIs RESTful para integraciones personalizadas"
        - "Sincronización de datos en tiempo real"
        - "Autenticación segura y manejo de datos"

    - label: "Analítica"
      title: "Analítica"
      description: "La analítica integral te ayuda a entender las necesidades de los clientes, optimizar el rendimiento del agente y medir el impacto en el negocio."
      image: "/images/features/analytics.png"
      reverse: false
      points:
        - "Monitoreo de conversaciones en tiempo real"
        - "Puntuación de satisfacción del cliente"
        - "Métricas de rendimiento y seguimiento de KPIs"
        - "Informes y paneles personalizados"

steps:
  title: "Cómo Funciona"
  description: "Pon en marcha tu agente virtual en tres simples pasos."
  items:
  - title: "Conectar"
    description: "Con tus sistemas empresariales"
    icon: "heroicons:link"
    leading: "Vincula tus sistemas existentes y ajusta la personalidad y el conocimiento de tu agente virtual."
    points:
        - "Nuestros agentes son expertos en los principales sistemas CRM y ERP"
        - "Podemos ayudarte a integrarte con tus sistemas personalizados"
        - "Las salvaguardas garantizan la privacidad y seguridad de los datos"
        - "Flujos de trabajo antes, durante y después de las interacciones"

  - title: "Probar"
    description: "Usando nuestro marco automatizado"
    icon: "heroicons:cog-6-tooth"
    leading: "Utiliza nuestro marco automatizado de pruebas y validación para asegurar respuestas perfectas antes de salir en vivo."
    points:
        - "Define criterios para evaluar el rendimiento del agente"
        - "Prueba escenarios e identifica puntos ciegos"
        - "Define reglas de transferencia para escenarios complejos"
        - "Prioriza la mejora del agente según métricas de rendimiento"

  - title: "Desplegar"
    description: "A una escala prácticamente ilimitada"
    icon: "heroicons:rocket-launch"
    leading: "Lanza en todos los canales y observa cómo tu agente virtual gestiona consultas de clientes 24/7 mientras te enfocas en el crecimiento."
    points:
        - "Puedes desplegar un número ilimitado de agentes virtuales"
        - "Nuestros sistemas están construidos para escalar. ¡Puedes crecer sin límites!"
        - "Monitorea el rendimiento de tus agentes en tiempo real"
        - "Mejora tus agentes en base a métricas y evaluaciones automatizadas"

