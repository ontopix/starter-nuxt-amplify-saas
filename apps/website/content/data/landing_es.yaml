seo:
  title: 'Ontopix - Agentes Virtuales de IA para Atención al Cliente'
  ogTitle: 'Ontopix - Agentes Virtuales de IA para Atención al Cliente'
  description: 'Transforma tu atención al cliente con agentes virtuales impulsados por IA. Despliega conversaciones inteligentes que funcionan 24/7, reduce costes y mejora la satisfacción.'
  ogDescription: 'Transforma tu atención al cliente con agentes virtuales impulsados por IA. Despliega conversaciones inteligentes que funcionan 24/7, reduce costes y mejora la satisfacción.'
  ogImage: '/og.png'
  twitterCard: 'summary_large_image'

hero:
  titleTransform: "Transforma tu atención al cliente con"
  titleAgents: "Agentes Virtuales de IA"
  description: "Despliega agentes virtuales inteligentes que hablan con naturalidad, entienden el contexto y resuelven problemas de los clientes 24/7. Reduce costes mientras mejoras la satisfacción."
  image: "/images/hero-dashboard.png"
  imageAlt: "Dashboard de Agentes Virtuales de Ontopix"
  links:
    - &start
      label: "Empezar"
      to: "/es/start"
